# Mẫu cấu hình Nginx tối ưu cho BeoHub (Dành cho Ubuntu/Linux)
# Lưu ý: Sửa đường dẫn /home/beohub/app/beohub/public/ cho khớp với server của bạn

# HTTP -> HTTPS
server {
    listen 80;
    server_name beohub.shop www.beohub.shop;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://beohub.shop$request_uri;
    }
}

# HTTPS www -> HTTPS apex
server {
    listen 443 ssl http2;
    server_name www.beohub.shop;

    ssl_certificate /etc/letsencrypt/live/beohub.shop/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/beohub.shop/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    return 301 https://beohub.shop$request_uri;
}

# HTTPS apex
server {
    listen 443 ssl http2;
    server_name beohub.shop;

    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/beohub.shop/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/beohub.shop/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    # --- TỐI ƯU HÓA BỘ NHỚ ĐỆM & NÉN GZIP ---
    
    # Bật nén Gzip để giảm dung lượng file truyền tải (Tăng tốc độ tải trang)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Caching File tĩnh trên RAM (Tránh đọc ổ cứng nhiều lần)
    # Vì máy chủ có 1GB RAM, việc lưu cache siêu dữ liệu (metadata) của 5000 file chỉ tốn vài Megabytes, rất an toàn!
    open_file_cache max=5000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # --- TỐI ƯU HÓA SERVE FILE TĨNH BẰNG NGINX ---
    
    # 1. Các file tĩnh cốt lõi (CSS, JS, Fonts, IMG cơ bản)
    location ~ ^/(css|js|img|fonts|assets)/ {
        root /home/beohub/app/beohub/public;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off; # Tắt log cho file tĩnh để giảm tải I/O
    }

    # 2. Thư mục Uploads (Ảnh, Video của người dùng)
    location /uploads/ {
        alias /home/beohub/app/beohub/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # 3. Các trang HTML tĩnh (Minigame, Trang chủ)
    # Nginx tự phục vụ index.html nếu người dùng vào root "/"
    location = / {
        root /home/beohub/app/beohub/public;
        try_files /index.html =404;
    }
    
    location = /minigame {
        root /home/beohub/app/beohub/public;
        try_files /minigame.html =404;
    }

    # --- CHUYỂN TIẾP API & CÁC ROUTE KHÁC CHO NODE.JS ---
    
    # Tất cả các request bắt đầu bằng /api hoặc các request không khớp file tĩnh sẽ chuyển cho Node.js
    location /api/ {
        proxy_pass http://127.0.0.1:3069;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Fallback cho các URL khác nếu bạn thêm page mới bên Node.js
    location / {
        proxy_pass http://127.0.0.1:3069;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
