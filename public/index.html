<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeoHub - Share Tốc Độ Cao Mạng LAN</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0c0c0c;
        }

        .bg-ph-dark {
            background-color: #1b1b1b;
        }

        .bg-ph-card {
            background-color: #242424;
        }

        .text-ph-orange {
            color: #ff9900;
        }

        .bg-ph-orange {
            background-color: #ff9900;
        }

        .border-ph-orange {
            border-color: #ff9900;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .animate-slide-in {
            animation: slideIn 0.3s ease-out forwards;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #111;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #ff9900;
        }
    </style>
</head>

<body class="min-h-screen font-sans text-gray-300">
    <div class="container mx-auto p-4 max-w-6xl">

        <!-- HEADER -->
        <header class="mb-8 flex flex-col items-center justify-center pt-4">
            <div class="flex items-center font-black text-3xl tracking-tighter select-none">
                <span class="text-white pr-1">Beo</span>
                <span class="bg-ph-orange text-black px-2 py-1 rounded-md font-bold">Hub</span>
            </div>
            <p class="text-gray-500 text-xs mt-2 tracking-wide font-medium uppercase">Hệ thống media nội bộ - Loop Đặt
                Tên Xem Trước</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <!-- Khu Vực Upload (Bên trái) -->
            <div class="bg-ph-dark p-4 rounded-xl border border-neutral-800 h-fit md:col-span-1 shadow-2xl">
                <h2
                    class="text-base font-bold mb-4 text-white uppercase tracking-wide border-b border-neutral-800 pb-2 flex items-center gap-1">
                    <span>📤</span> Tải nội dung lên
                </h2>
                <form id="uploadForm" class="space-y-4">

                    <div id="dropzone"
                        class="border-2 border-dashed border-neutral-700 rounded-xl p-5 text-center cursor-pointer hover:border-ph-orange hover:bg-neutral-800 transition-all relative group bg-neutral-900">
                        <input type="file" id="fileInput" multiple accept="image/*,video/*" class="hidden">
                        <div class="space-y-2 pointer-events-none">
                            <div class="text-2xl transition-transform group-hover:scale-110">🎥</div>
                            <p class="text-xs font-bold text-gray-400">Kéo thả Ảnh / Video vào đây</p>
                            <p class="text-[11px] text-gray-600">hoặc <span class="text-ph-orange underline">duyệt file
                                    máy tính</span></p>
                        </div>
                        <div id="fileCounter" class="mt-2 text-xs font-bold text-ph-orange hidden"></div>
                    </div>

                    <!-- DANH SÁCH LOOP XEM TRƯỚC VÀ ĐẶT TÊN RIÊNG BIỆT TỪNG FILE -->
                    <div id="previewContainer" class="hidden space-y-2">
                        <label class="block text-[11px] font-bold text-neutral-400 uppercase tracking-wider">Cấu hình
                            tên tệp tin chọn</label>
                        <!-- Thùng chứa dạng list cuộn dọc, giao diện tối sẫm -->
                        <div id="previewGrid"
                            class="space-y-3 p-2 bg-neutral-900 border border-neutral-800 rounded-lg max-h-64 overflow-y-auto custom-scrollbar">
                            <!-- JS loop chèn các row vào đây -->
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Hashtags
                            chung (Dấu phẩy phân cách)</label>
                        <input type="text" id="tagsInput" placeholder="Ví dụ: meme, hot"
                            class="w-full p-2 bg-neutral-900 border border-neutral-800 rounded-lg text-sm text-white focus:outline-none focus:border-ph-orange transition">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Mô tả
                            chung chi tiết</label>
                        <textarea id="descInput" rows="2" placeholder="Nhập mô tả ngắn..."
                            class="w-full p-2 bg-neutral-900 border border-neutral-800 rounded-lg text-sm text-white focus:outline-none focus:border-ph-orange transition"></textarea>
                    </div>
                    <button type="submit"
                        class="w-full bg-ph-orange text-black py-2.5 rounded-lg font-bold text-sm hover:bg-amber-500 transition duration-150 shadow-md">BẮT
                        ĐẦU UPLOAD</button>
                </form>
            </div>

            <!-- Khu Vực Thư Viện Media (Bên phải) -->
            <div class="md:col-span-3 space-y-4">
                <div class="w-full relative">
                    <input type="text" id="searchInput"
                        placeholder="🔍 Nhập tên file, định dạng hoặc hashtag cần tìm..."
                        class="w-full p-3.5 bg-ph-dark rounded-xl border border-neutral-800 text-white focus:outline-none focus:border-ph-orange transition text-sm shadow-xl pl-5 placeholder-gray-600">
                </div>
                <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
            </div>
        </div>
    </div>

    <!-- Container Toast -->
    <div id="toastContainer"
        class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 max-w-sm w-full pointer-events-none"></div>

    <!-- MODAL CHI TIẾT SPLIT-SCREEN -->
    <div id="mediaModal"
        class="fixed inset-0 bg-black bg-opacity-95 hidden z-50 flex items-center justify-center p-0 md:p-6 transition-all duration-200"
        onclick="closeModal()">
        <div class="relative bg-ph-dark w-full max-w-5xl h-full md:h-[85vh] flex flex-col md:flex-row rounded-none md:rounded-xl overflow-hidden border border-neutral-800 shadow-2xl"
            onclick="event.stopPropagation()">
            <span
                class="absolute top-3 right-4 text-white text-3xl font-light cursor-pointer hover:text-ph-orange transition z-50 md:hidden"
                onclick="closeModal()">&times;</span>
            <div
                class="w-full md:w-3/5 h-1/2 md:h-full bg-black flex items-center justify-center relative border-b md:border-b-0 md:border-r border-neutral-800">
                <div id="modalContent" class="w-full h-full flex items-center justify-center p-2"></div>
            </div>
            <div class="w-full md:w-2/5 h-1/2 md:h-full flex flex-col justify-between bg-ph-dark p-4">
                <div class="border-b border-neutral-800 pb-3 relative">
                    <span
                        class="absolute top-0 right-0 text-white text-4xl font-light cursor-pointer hover:text-ph-orange transition hidden md:block"
                        onclick="closeModal()">&times;</span>
                    <h3 id="modalTitle" class="font-bold text-white text-base truncate pr-8"></h3>
                    <p id="modalDesc" class="text-xs text-neutral-400 mt-1 leading-relaxed line-clamp-2"></p>
                    <div id="modalTags" class="flex flex-wrap gap-1 mt-2"></div>
                </div>
                <div class="flex items-center justify-between py-2 border-b border-neutral-800">
                    <div class="flex items-center gap-2">
                        <button id="likeBtn"
                            class="flex items-center gap-1.5 bg-neutral-900 border border-neutral-800 hover:border-ph-orange px-3 py-2 rounded-lg group transition">
                            <span class="text-sm group-hover:scale-125 transition duration-150">❤️</span>
                            <span class="text-[11px] font-bold text-white tracking-wide">THẢ TIM</span>
                        </button>
                        <div class="text-[11px] font-bold text-neutral-400"><span id="likeCount"
                                class="text-ph-orange text-sm font-mono">0</span> thích</div>
                    </div>
                    <button id="shareLinkBtn"
                        class="flex items-center gap-1.5 bg-neutral-900 border border-neutral-800 hover:border-ph-orange px-3 py-2 rounded-lg text-white font-bold text-[11px] tracking-wide transition">🔗
                        COPY LINK SHARE</button>
                </div>
                <div class="flex-grow overflow-y-auto py-3 space-y-3 custom-scrollbar" id="commentsContainer"></div>
                <form id="commentForm" class="border-t border-neutral-800 pt-3 flex gap-2">
                    <input type="text" id="commentInput" placeholder="Viết bình luận công khai (ẩn danh)..."
                        autocomplete="off"
                        class="flex-grow p-2.5 bg-neutral-900 border border-neutral-800 rounded-lg text-xs text-white focus:outline-none focus:border-ph-orange transition placeholder-neutral-600">
                    <button type="submit"
                        class="bg-ph-orange text-black px-4 rounded-lg text-xs font-black hover:bg-amber-500 transition tracking-wider whitespace-nowrap">GỬI</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Sửa Thông Tin -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-70 hidden z-40 flex items-center justify-center p-4">
        <div class="bg-ph-dark rounded-xl shadow-2xl max-w-md w-full p-6 space-y-4 relative border border-neutral-800">
            <span
                class="absolute top-2 right-4 text-gray-500 hover:text-white text-2xl font-bold cursor-pointer transition"
                onclick="closeEditModal()">&times;</span>
            <h3 class="text-base font-bold text-white border-b border-neutral-800 pb-2 uppercase tracking-wider">✏️
                Chỉnh sửa nội dung</h3>
            <form id="editForm" class="space-y-4">
                <input type="hidden" id="editOldName">
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Tên tệp tin
                        (Tự động lọc sạch dấu)</label>
                    <input type="text" id="editNewNameInput"
                        class="w-full p-2 bg-neutral-900 border border-neutral-800 rounded-lg text-sm text-white font-medium focus:outline-none focus:border-ph-orange transition">
                </div>
                <div>
                    <label
                        class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Hashtags</label>
                    <input type="text" id="editTagsInput"
                        class="w-full p-2 bg-neutral-900 border border-neutral-800 rounded-lg text-sm text-white focus:outline-none focus:border-ph-orange transition">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Mô tả nội
                        dung</label>
                    <textarea id="editDescInput" rows="3"
                        class="w-full p-2 bg-neutral-900 border border-neutral-800 rounded-lg text-sm text-white focus:outline-none focus:border-ph-orange transition"></textarea>
                </div>
                <div class="flex gap-2 justify-end pt-2 border-t border-neutral-800">
                    <button type="button" onclick="closeEditModal()"
                        class="px-4 py-2 text-xs font-bold text-gray-400 hover:text-white bg-neutral-900 border border-neutral-800 rounded-lg transition">HỦY
                        BỎ</button>
                    <button type="submit"
                        class="px-4 py-2 text-xs font-bold text-black bg-ph-orange hover:bg-amber-500 rounded-lg transition shadow-md">LƯU
                        THAY ĐỔI</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const searchInput = document.getElementById('searchInput');
        const galleryGrid = document.getElementById('galleryGrid');

        const mediaModal = document.getElementById('mediaModal');
        const modalContent = document.getElementById('modalContent');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        const modalTags = document.getElementById('modalTags');
        const likeBtn = document.getElementById('likeBtn');
        const likeCount = document.getElementById('likeCount');
        const shareLinkBtn = document.getElementById('shareLinkBtn');
        const commentsContainer = document.getElementById('commentsContainer');
        const commentForm = document.getElementById('commentForm');
        const commentInput = document.getElementById('commentInput');

        const toastContainer = document.getElementById('toastContainer');
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const fileCounter = document.getElementById('fileCounter');

        // Biến Preview
        const previewContainer = document.getElementById('previewContainer');
        const previewGrid = document.getElementById('previewGrid');

        const editModal = document.getElementById('editModal');
        const editForm = document.getElementById('editForm');
        const editOldName = document.getElementById('editOldName');
        const editTagsInput = document.getElementById('editTagsInput');
        const editDescInput = document.getElementById('editDescInput');

        let selectedFiles = []; let globalMediaList = []; let activeMediaName = ""; let isInitialLoad = true;

        function isVideo(fileName) { return /\.(mp4|webm|mov|avi|mkv|3gp)$/i.test(fileName); }

        // Helper Frontend để sinh nhanh tên thô loại bỏ dấu hiển thị vào input
        function cleanNameFrontend(str) {
            str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
            str = str.replace(/è|é|ẹ|e|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
            str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
            str = str.replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
            str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
            str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
            str = str.replace(/đ/g, "d");
            str = str.replace(/\s+/g, "-");
            str = str.replace(/[^a-zA-Z0-9.\-_]/g, "");
            return str;
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-2xl text-white font-bold text-xs flex items-center justify-between pointer-events-auto animate-slide-in border ${type === 'success' ? 'bg-neutral-900 border-emerald-500 text-emerald-400' : 'bg-neutral-900 border-rose-500 text-rose-400'}`;
            toast.innerHTML = `<span>${message}</span><button onclick="this.parentElement.remove()" class="ml-4 text-gray-500 hover:text-white font-bold text-base transition">&times;</button>`;
            toastContainer.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(100%)'; toast.style.transition = 'all 0.3s ease-in'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // --- Drag & Drop ---
        dropzone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFilesSelection(e.target.files));
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => dropzone.addEventListener(ev, (e) => e.preventDefault(), false));
        ['dragenter', 'dragover'].forEach(ev => dropzone.classList.add('border-ph-orange', 'bg-neutral-800'));
        ['dragleave', 'drop'].forEach(ev => dropzone.classList.remove('border-ph-orange', 'bg-neutral-800'));
        dropzone.addEventListener('drop', (e) => handleFilesSelection(e.dataTransfer.files));

        // NÂNG CẤP CHÍNH: Render Loop Danh Sách Preview và Đổ sẵn tên thô không dấu vào Input
        function handleFilesSelection(files) {
            const validFiles = Array.from(files).filter(file => file.type.startsWith('image/') || file.type.startsWith('video/'));
            if (validFiles.length === 0) { showToast('Vui lòng chọn file hình ảnh hoặc video thích hợp!', 'error'); return; }

            selectedFiles = validFiles;
            fileCounter.textContent = `✓ Đã chọn ${selectedFiles.length} tệp`;
            fileCounter.classList.remove('hidden');

            previewGrid.innerHTML = '';

            selectedFiles.forEach((file, index) => {
                const objectUrl = URL.createObjectURL(file);
                const isItemVideo = file.type.startsWith('video/');

                // Tách lấy tên thô (Base Name) sạch dấu để điền mặc định vào input cho người dùng sửa
                const lastDot = file.name.lastIndexOf('.');
                const rawName = lastDot !== -1 ? file.name.substring(0, lastDot) : file.name;
                const cleanedDefaultName = cleanNameFrontend(rawName);

                // Tạo 1 Row ngang chứa cả Thumbnail lẫn Input đặt tên riêng
                const row = document.createElement('div');
                row.className = "flex items-center gap-2 bg-neutral-950 p-2 rounded-lg border border-neutral-800/60";

                // Cột bên trái: Thumbnail thu nhỏ
                let mediaElement = `<img src="${objectUrl}" class="w-12 h-12 object-cover rounded bg-black">`;
                if (isItemVideo) {
                    mediaElement = `
                        <div class="w-12 h-12 relative bg-black rounded overflow-hidden flex items-center justify-center">
                            <video src="${objectUrl}" class="w-full h-full object-cover" muted></video>
                            <span class="absolute text-[8px] bg-ph-orange text-black font-black px-0.5 rounded bottom-0">VID</span>
                        </div>
                    `;
                }

                // Cột bên phải: Input đặt tên tương ứng (Đánh dấu class name="customNameInputs" để loop lấy data khi submit)
                row.innerHTML = `
                    ${mediaElement}
                    <div class="flex-grow">
                        <input type="text" name="customNameInputs" data-index="${index}" value="${cleanedDefaultName}" placeholder="Đặt tên cho tệp..." class="w-full p-1.5 bg-neutral-900 border border-neutral-800 rounded text-xs text-white focus:outline-none focus:border-ph-orange transition font-medium">
                    </div>
                `;

                previewGrid.appendChild(row);
            });

            previewContainer.classList.remove('hidden');
        }

        // --- Fetch & Render Thư Viện ---
        async function fetchImages(search = '') {
            const res = await fetch(`/api/images?search=${encodeURIComponent(search)}`);
            globalMediaList = await res.json();

            const urlParams = new URLSearchParams(window.location.search);
            const isAdmin = urlParams.get('isAdmin') === '1';
            const targetId = urlParams.get('id');

            if (globalMediaList.length === 0) {
                galleryGrid.innerHTML = `<div class="col-span-full text-center text-neutral-600 py-12 font-bold text-sm tracking-wide bg-ph-dark rounded-xl border border-neutral-800">DANH SÁCH TRỐNG - CHƯA CÓ NỘI DUNG NÀO ĐƯỢC ĐĂNG</div>`;
                return;
            }

            galleryGrid.innerHTML = globalMediaList.map(item => {
                const checkVideo = isVideo(item.name);
                const currentLikes = item.likes || 0;
                const currentCommentsCount = item.comments ? item.comments.length : 0;

                const mediaPreview = checkVideo
                    ? `<video src="${item.url}" class="object-contain w-full h-full max-h-44" muted></video><div class="absolute inset-0 bg-black bg-opacity-30 flex items-center justify-center pointer-events-none"><span class="text-black text-xs bg-ph-orange font-black px-2 py-1 rounded shadow-lg tracking-tighter">PLAY VIDEO</span></div>`
                    : `<img src="${item.url}" alt="${item.name}" class="object-contain w-full h-full max-h-44 transition-transform duration-300 group-hover:scale-105">`;

                let actionButtons = `<a href="${item.url}" download="${item.name}" class="flex items-center justify-center gap-1 text-xs bg-neutral-800 text-gray-300 py-2 rounded-lg hover:bg-neutral-700 font-bold text-center transition col-span-2 tracking-wide border border-neutral-700">📥 TẢI XUỐNG</a>`;

                if (isAdmin) {
                    actionButtons = `
                        <a href="${item.url}" download="${item.name}" class="flex items-center justify-center gap-1 text-xs bg-neutral-800 text-gray-300 py-2 rounded-lg hover:bg-neutral-700 font-bold text-center transition col-span-2 tracking-wide border border-neutral-700">📥 TẢI XUỐNG</a>
                        <button onclick="event.stopPropagation(); openEditModal('${item.name}')" class="flex items-center justify-center gap-1 text-xs bg-amber-950 text-amber-400 py-2 rounded-lg hover:bg-amber-900 font-bold text-center transition border border-amber-900/50">✏️ SỬA</button>
                        <button onclick="event.stopPropagation(); deleteImage('${item.name}')" class="flex items-center justify-center gap-1 text-xs bg-rose-950 text-rose-400 py-2 rounded-lg hover:bg-rose-900 font-bold text-center transition border border-rose-900/50">🗑️ XÓA</button>
                    `;
                }

                const dateStr = new Date(item.uploadedAt).toLocaleString('vi-VN', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });

                return `
                    <div onclick="openModal('${item.url}', '${item.name}')" class="bg-ph-dark rounded-xl overflow-hidden border border-neutral-800 flex flex-col justify-between shadow-lg group cursor-pointer">
                        <div class="aspect-video bg-neutral-950 flex items-center justify-center overflow-hidden relative">${mediaPreview}</div>
                        <div class="p-3.5 flex-grow flex flex-col justify-between space-y-2">
                            <div>
                                <h3 class="font-bold text-sm text-white group-hover:text-ph-orange transition truncate" title="${item.name}">${item.name}</h3>
                                <p class="text-xs text-neutral-500 mt-1 line-clamp-1 leading-relaxed">${item.description || '<i class="text-neutral-700">Không có mô tả sản phẩm</i>'}</p>
                                <div class="flex items-center justify-between mt-2">
                                    <span class="text-[10px] text-neutral-600 font-mono">📅 ${dateStr}</span>
                                    <span class="text-[10px] text-ph-orange font-bold flex items-center gap-2 bg-neutral-900 px-2 py-0.5 rounded border border-neutral-800"><span>❤️ ${currentLikes}</span><span>💬 ${currentCommentsCount}</span></span>
                                </div>
                            </div>
                            <div>
                                <div class="flex flex-wrap gap-1 my-1">${item.hashtags.map(tag => `<span class="bg-neutral-900 text-neutral-400 text-[10px] font-bold px-2 py-0.5 rounded border border-neutral-800">#${tag}</span>`).join('')}</div>
                                <div class="grid grid-cols-2 gap-2 pt-2 border-t border-neutral-800">${actionButtons}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            if (isInitialLoad && targetId) {
                isInitialLoad = false; const matched = globalMediaList.find(img => img.name === targetId);
                if (matched) openModal(matched.url, matched.name);
            }
            if (!mediaModal.classList.contains('hidden') && activeMediaName) renderModalInteractions(activeMediaName);
        }

        // --- Gửi dữ liệu Tải lên mới ---
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (selectedFiles.length === 0) { showToast('Vui lòng chọn hoặc kéo thả tệp tin!', 'error'); return; }

            const formData = new FormData();
            selectedFiles.forEach(file => formData.append('images', file));
            formData.append('hashtags', document.getElementById('tagsInput').value);
            formData.append('description', document.getElementById('descInput').value);

            // LOOP THU THẬP TẤT CẢ TÊN TÙY CHỈNH TỪ DANH SÁCH XEM TRƯỚC GỬI LÊN SERVER
            const nameInputs = document.querySelectorAll('input[name="customNameInputs"]');
            nameInputs.forEach(input => {
                formData.append('customNames', input.value);
            });

            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const result = await res.json();
                if (res.ok && result.success) {
                    showToast(result.message, 'success');
                    uploadForm.reset(); selectedFiles = []; fileCounter.classList.add('hidden');
                    previewContainer.classList.add('hidden'); previewGrid.innerHTML = '';
                    fetchImages();
                } else {
                    showToast(result.message || 'Lỗi hệ thống!', 'error');
                }
            } catch (err) { showToast('Lỗi kết nối tới máy chủ BeoHub!', 'error'); }
        });

        // --- Sửa Thông Tin form Sửa ---
        function openEditModal(name) {
            const currentItem = globalMediaList.find(item => item.name === name);
            if (!currentItem) return;
            editOldName.value = currentItem.name;
            document.getElementById('editNewNameInput').value = currentItem.name;
            editTagsInput.value = currentItem.hashtags.join(', ');
            editDescInput.value = currentItem.description || '';
            editModal.classList.remove('hidden');
        }

        function closeEditModal() { editModal.classList.add('hidden'); }

        editForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const urlParams = new URLSearchParams(window.location.search);
            const isAdmin = urlParams.get('isAdmin') || '0';
            const oldName = editOldName.value;
            const newName = document.getElementById('editNewNameInput').value;

            const formData = new FormData();
            formData.append('newName', newName);
            formData.append('hashtags', editTagsInput.value);
            formData.append('description', editDescInput.value);

            try {
                const res = await fetch(`/api/images/${encodeURIComponent(oldName)}?isAdmin=${isAdmin}`, { method: 'PUT', body: formData });
                const result = await res.json();
                if (res.ok && result.success) { showToast(result.message, 'success'); closeEditModal(); fetchImages(searchInput.value); }
                else { showToast(result.message, 'error'); }
            } catch (err) { showToast('Có lỗi xảy ra khi cập nhật tệp tin.', 'error'); }
        });

        // --- Xóa Bỏ & Tương tác Phụ ---
        async function deleteImage(fileName) {
            if (!confirm(`Xóa vĩnh viễn tệp tin "${fileName}" khỏi BeoHub?`)) return;
            const urlParams = new URLSearchParams(window.location.search);
            try {
                const res = await fetch(`/api/images/${encodeURIComponent(fileName)}?isAdmin=${urlParams.get('isAdmin') || '0'}`, { method: 'DELETE' });
                if (res.ok) { showToast('Đã xóa dữ liệu thành công.', 'success'); fetchImages(searchInput.value); }
            } catch (err) { showToast('Gặp lỗi khi xóa dữ liệu.', 'error'); }
        }

        let searchTimeout; searchInput.addEventListener('input', (e) => { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => fetchImages(e.target.value), 300); });

        function openModal(url, name) {
            activeMediaName = name; const urlParams = new URLSearchParams(window.location.search); urlParams.set('id', name);
            window.history.pushState({ path: window.location.pathname + '?' + urlParams.toString() }, '', window.location.pathname + '?' + urlParams.toString());
            modalContent.innerHTML = isVideo(name) ? `<video src="${url}" class="max-w-full max-h-full rounded shadow-lg" controls autoplay></video>` : `<img src="${url}" class="max-w-full max-h-full object-contain">`;
            renderModalInteractions(name); mediaModal.classList.remove('hidden');
        }

        function renderModalInteractions(name) {
            const currentItem = globalMediaList.find(item => item.name === name); if (!currentItem) return;
            modalTitle.textContent = currentItem.name; modalDesc.innerHTML = currentItem.description || '<i class="text-neutral-700">Không có mô tả sản phẩm</i>'; likeCount.textContent = currentItem.likes || 0;
            modalTags.innerHTML = currentItem.hashtags.map(tag => `<span class="bg-neutral-900 text-neutral-400 text-[10px] font-bold px-2 py-0.5 rounded border border-neutral-800">#${tag}</span>`).join('');
            const comments = currentItem.comments || [];
            if (comments.length === 0) { commentsContainer.innerHTML = `<div class="text-center text-neutral-600 text-xs py-8 italic">Chưa có bình luận.</div>`; }
            else {
                commentsContainer.innerHTML = comments.map(cmt => {
                    return `<div class="bg-neutral-900 border border-neutral-800 p-2.5 rounded-lg text-xs space-y-1"><div class="flex items-center justify-between font-bold"><span class="text-ph-orange">🧡 ${cmt.author}</span><span class="text-[10px] text-neutral-600 font-mono">${new Date(cmt.createdAt).toLocaleString('vi-VN')}</span></div><p class="text-gray-300 break-all">${cmt.text}</p></div>`;
                }).join('');
                commentsContainer.scrollTop = commentsContainer.scrollHeight;
            }
        }

        shareLinkBtn.onclick = async () => {
            if (!activeMediaName) return; const shareUrl = window.location.href;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                try { await navigator.clipboard.writeText(shareUrl); showToast('Đã copy đường dẫn bài đăng!', 'success'); return; } catch (e) { }
            }
            const t = document.createElement("textarea"); t.value = shareUrl; t.style.position = "fixed"; t.style.left = "-9999px"; document.body.appendChild(t); t.focus(); t.select(); document.execCommand('copy'); document.body.removeChild(t);
            showToast('Đã copy đường dẫn bài đăng (LAN Fallback)!', 'success');
        };

        likeBtn.onclick = async () => {
            if (!activeMediaName) return;
            const res = await fetch(`/api/images/${encodeURIComponent(activeMediaName)}/like`, { method: 'POST' });
            const r = await res.json(); if (r.success) { likeCount.textContent = r.likes; fetchImages(searchInput.value); }
        };

        commentForm.onsubmit = async (e) => {
            e.preventDefault(); const text = commentInput.value.trim(); if (!text || !activeMediaName) return;
            const res = await fetch(`/api/images/${encodeURIComponent(activeMediaName)}/comment`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
            if (res.ok) { commentInput.value = ''; fetchImages(searchInput.value); }
        };

        function closeModal() { mediaModal.classList.add('hidden'); modalContent.innerHTML = ''; activeMediaName = ""; const urlParams = new URLSearchParams(window.location.search); urlParams.delete('id'); const clean = window.location.pathname + (urlParams.toString() ? '?' + urlParams.toString() : ''); window.history.pushState({ path: clean }, '', clean); }
        function closeEditModal() { editModal.classList.add('hidden'); }
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeModal(); closeEditModal(); } });

        fetchImages();
    </script>
</body>

</html>
