<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeoHub - Share Tốc Độ Cao Mạng LAN</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0c0c0c;
        }

        .bg-ph-dark {
            background-color: #1b1b1b;
        }

        .bg-ph-card {
            background-color: #242424;
        }

        .text-ph-orange {
            color: #ff9900;
        }

        .bg-ph-orange {
            background-color: #ff9900;
        }

        .border-ph-orange {
            border-color: #ff9900;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .animate-slide-in {
            animation: slideIn 0.3s ease-out forwards;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #111;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #ff9900;
        }
    </style>
</head>

<body class="min-h-screen font-sans text-gray-300">
    <div class="container mx-auto p-4 max-w-6xl">

        <!-- HEADER PHONG CÁCH BEOHUB -->
        <header class="mb-8 flex flex-col items-center justify-center pt-4">
            <div class="flex items-center font-black text-3xl tracking-tighter select-none">
                <span class="text-white pr-1">Beo</span>
                <span class="bg-ph-orange text-black px-2 py-1 rounded-md font-bold">Hub</span>
            </div>
            <p class="text-gray-500 text-xs mt-2 tracking-wide font-medium uppercase">Hệ thống lưu trữ & chia sẻ media
                nội bộ siêu tốc</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <!-- Khu Vực Upload (Bên trái) -->
            <div class="bg-ph-dark p-4 rounded-xl border border-neutral-800 h-fit md:col-span-1 shadow-2xl">
                <h2
                    class="text-base font-bold mb-4 text-white uppercase tracking-wide border-b border-neutral-800 pb-2 flex items-center gap-1">
                    <span>📤</span> Tải nội dung lên
                </h2>
                <form id="uploadForm" class="space-y-4">
                    <div id="dropzone"
                        class="border-2 border-dashed border-neutral-700 rounded-xl p-5 text-center cursor-pointer hover:border-ph-orange hover:bg-neutral-800 transition-all relative group bg-neutral-900">
                        <input type="file" id="fileInput" multiple accept="image/*,video/*" class="hidden">
                        <div class="space-y-2 pointer-events-none">
                            <div class="text-2xl transition-transform group-hover:scale-110">🎥</div>
                            <p class="text-xs font-bold text-gray-400">Kéo thả Ảnh / Video vào đây</p>
                            <p class="text-[11px] text-gray-600">hoặc <span class="text-ph-orange underline">duyệt file
                                    máy tính</span></p>
                        </div>
                        <div id="fileCounter" class="mt-2 text-xs font-bold text-ph-orange hidden"></div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Hashtags
                            (Phân cách bằng dấu phẩy)</label>
                        <input type="text" id="tagsInput" placeholder="Ví dụ: meme, hot, bi-mat"
                            class="w-full p-2 bg-neutral-900 border border-neutral-800 rounded-lg text-sm text-white focus:outline-none focus:border-ph-orange transition">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Mô tả chi
                            tiết</label>
                        <textarea id="descInput" rows="2" placeholder="Nhập một vài mô tả ngắn..."
                            class="w-full p-2 bg-neutral-900 border border-neutral-800 rounded-lg text-sm text-white focus:outline-none focus:border-ph-orange transition"></textarea>
                    </div>
                    <button type="submit"
                        class="w-full bg-ph-orange text-black py-2.5 rounded-lg font-bold text-sm hover:bg-amber-500 transition duration-150 shadow-md">BẮT
                        ĐẦU UPLOAD</button>
                </form>
            </div>

            <!-- Khu Vực Thư Viện Media (Bên phải) -->
            <div class="md:col-span-3 space-y-4">
                <div class="w-full relative">
                    <input type="text" id="searchInput"
                        placeholder="🔍 Nhập tên file, định dạng video hoặc hashtag cần tìm..."
                        class="w-full p-3.5 bg-ph-dark rounded-xl border border-neutral-800 text-white focus:outline-none focus:border-ph-orange transition text-sm shadow-xl pl-5 placeholder-gray-600">
                </div>
                <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
            </div>
        </div>
    </div>

    <!-- Container chứa các thông báo Toast -->
    <div id="toastContainer"
        class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 max-w-sm w-full pointer-events-none"></div>

    <!-- MODAL CHI TIẾT SPLIT-SCREEN -->
    <div id="mediaModal"
        class="fixed inset-0 bg-black bg-opacity-95 hidden z-50 flex items-center justify-center p-0 md:p-6 transition-all duration-200"
        onclick="closeModal()">
        <div class="relative bg-ph-dark w-full max-w-5xl h-full md:h-[85vh] flex flex-col md:flex-row rounded-none md:rounded-xl overflow-hidden border border-neutral-800 shadow-2xl"
            onclick="event.stopPropagation()">

            <span
                class="absolute top-3 right-4 text-white text-3xl font-light cursor-pointer hover:text-ph-orange transition z-50 md:hidden"
                onclick="closeModal()">&times;</span>

            <!-- BÊN TRÁI: Khu vực hiển thị Ảnh/Video -->
            <div
                class="w-full md:w-3/5 h-1/2 md:h-full bg-black flex items-center justify-center relative border-b md:border-b-0 md:border-r border-neutral-800">
                <div id="modalContent" class="w-full h-full flex items-center justify-center p-2"></div>
            </div>

            <!-- BÊN PHẢI: Khu vực Tương tác (Like, Share Link, Bình luận) -->
            <div class="w-full md:w-2/5 h-1/2 md:h-full flex flex-col justify-between bg-ph-dark p-4">

                <div class="border-b border-neutral-800 pb-3 relative">
                    <span
                        class="absolute top-0 right-0 text-white text-4xl font-light cursor-pointer hover:text-ph-orange transition hidden md:block"
                        onclick="closeModal()">&times;</span>
                    <h3 id="modalTitle" class="font-bold text-white text-base truncate pr-8"></h3>
                    <p id="modalDesc" class="text-xs text-neutral-400 mt-1 leading-relaxed line-clamp-2"></p>
                    <div id="modalTags" class="flex flex-wrap gap-1 mt-2"></div>
                </div>

                <!-- KHU VỰC THẢ TIM & CHIA SẺ URL -->
                <div class="flex items-center justify-between py-2 border-b border-neutral-800">
                    <div class="flex items-center gap-2">
                        <button id="likeBtn"
                            class="flex items-center gap-1.5 bg-neutral-900 border border-neutral-800 hover:border-ph-orange px-3 py-2 rounded-lg group transition">
                            <span class="text-sm group-hover:scale-125 transition duration-150">❤️</span>
                            <span class="text-[11px] font-bold text-white tracking-wide">THẢ TIM</span>
                        </button>
                        <div class="text-[11px] font-bold text-neutral-400">
                            <span id="likeCount" class="text-ph-orange text-sm font-mono">0</span> thích
                        </div>
                    </div>

                    <!-- NÚT COPY LINK CHIA SẺ NHANH -->
                    <button id="shareLinkBtn"
                        class="flex items-center gap-1.5 bg-neutral-900 border border-neutral-800 hover:border-ph-orange px-3 py-2 rounded-lg text-white font-bold text-[11px] tracking-wide transition">
                        <span>🔗</span> COPY LINK SHARE
                    </button>
                </div>

                <!-- DANH SÁCH BÌNH LUẬN -->
                <div class="flex-grow overflow-y-auto py-3 space-y-3 custom-scrollbar" id="commentsContainer"></div>

                <!-- FORM GỬI BÌNH LUẬN -->
                <form id="commentForm" class="border-t border-neutral-800 pt-3 flex gap-2">
                    <input type="text" id="commentInput" placeholder="Viết bình luận công khai (ẩn danh)..."
                        autocomplete="off"
                        class="flex-grow p-2.5 bg-neutral-900 border border-neutral-800 rounded-lg text-xs text-white focus:outline-none focus:border-ph-orange transition placeholder-neutral-600">
                    <button type="submit"
                        class="bg-ph-orange text-black px-4 rounded-lg text-xs font-black hover:bg-amber-500 transition tracking-wider whitespace-nowrap">GỬI</button>
                </form>
            </div>

        </div>
    </div>

    <!-- Modal Sửa Thông Tư -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-70 hidden z-40 flex items-center justify-center p-4">
        <div class="bg-ph-dark rounded-xl shadow-2xl max-w-md w-full p-6 space-y-4 relative border border-neutral-800">
            <span
                class="absolute top-2 right-4 text-gray-500 hover:text-white text-2xl font-bold cursor-pointer transition"
                onclick="closeEditModal()">&times;</span>
            <h3 class="text-base font-bold text-white border-b border-neutral-800 pb-2 uppercase tracking-wider">✏️
                Chỉnh sửa nội dung</h3>
            <form id="editForm" class="space-y-4">
                <input type="hidden" id="editOldName">
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Tên tệp
                        tin</label>
                    <input type="text" id="editNewNameInput"
                        class="w-full p-2 bg-neutral-900 border border-neutral-800 rounded-lg text-sm text-white font-medium focus:outline-none focus:border-ph-orange transition">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Thay thế file
                        gốc (Không bắt buộc)</label>
                    <input type="file" id="editFileInput" accept="image/*,video/*"
                        class="w-full text-xs text-gray-400 file:mr-4 file:py-1.5 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-bold file:bg-neutral-800 file:text-ph-orange hover:file:bg-neutral-700 cursor-pointer">
                </div>
                <div>
                    <label
                        class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Hashtags</label>
                    <input type="text" id="editTagsInput"
                        class="w-full p-2 bg-neutral-900 border border-neutral-800 rounded-lg text-sm text-white focus:outline-none focus:border-ph-orange transition">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">Mô tả nội
                        dung</label>
                    <textarea id="editDescInput" rows="3"
                        class="w-full p-2 bg-neutral-900 border border-neutral-800 rounded-lg text-sm text-white focus:outline-none focus:border-ph-orange transition"></textarea>
                </div>
                <div class="flex gap-2 justify-end pt-2 border-t border-neutral-800">
                    <button type="button" onclick="closeEditModal()"
                        class="px-4 py-2 text-xs font-bold text-gray-400 hover:text-white bg-neutral-900 border border-neutral-800 rounded-lg transition">HỦY
                        BỎ</button>
                    <button type="submit"
                        class="px-4 py-2 text-xs font-bold text-black bg-ph-orange hover:bg-amber-500 rounded-lg transition shadow-md">LƯU
                        THAY ĐỔI</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const searchInput = document.getElementById('searchInput');
        const galleryGrid = document.getElementById('galleryGrid');

        const mediaModal = document.getElementById('mediaModal');
        const modalContent = document.getElementById('modalContent');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        const modalTags = document.getElementById('modalTags');
        const likeBtn = document.getElementById('likeBtn');
        const likeCount = document.getElementById('likeCount');
        const shareLinkBtn = document.getElementById('shareLinkBtn');
        const commentsContainer = document.getElementById('commentsContainer');
        const commentForm = document.getElementById('commentForm');
        const commentInput = document.getElementById('commentInput');

        const toastContainer = document.getElementById('toastContainer');
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const fileCounter = document.getElementById('fileCounter');

        const editModal = document.getElementById('editModal');
        const editForm = document.getElementById('editForm');
        const editOldName = document.getElementById('editOldName');
        const editFileInput = document.getElementById('editFileInput');
        const editTagsInput = document.getElementById('editTagsInput');
        const editDescInput = document.getElementById('editDescInput');

        let selectedFiles = [];
        let globalMediaList = [];
        let activeMediaName = "";
        let isInitialLoad = true; // Cờ đánh dấu lần đầu tiên tải trang

        function isVideo(fileName) { return /\.(mp4|webm|mov|avi|mkv|3gp)$/i.test(fileName); }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-2xl text-white font-bold text-xs flex items-center justify-between pointer-events-auto animate-slide-in border ${type === 'success' ? 'bg-neutral-900 border-emerald-500 text-emerald-400' : 'bg-neutral-900 border-rose-500 text-rose-400'
                }`;
            toast.innerHTML = `<span>${message}</span><button onclick="this.parentElement.remove()" class="ml-4 text-gray-500 hover:text-white font-bold text-base transition">&times;</button>`;
            toastContainer.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0'; toast.style.transform = 'translateX(100%)'; toast.style.transition = 'all 0.3s ease-in';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- Drag & Drop ---
        dropzone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFilesSelection(e.target.files));
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => dropzone.addEventListener(ev, (e) => e.preventDefault(), false));
        ['dragenter', 'dragover'].forEach(ev => dropzone.addEventListener(ev, () => dropzone.classList.add('border-ph-orange', 'bg-neutral-800')));
        ['dragleave', 'drop'].forEach(ev => dropzone.addEventListener(ev, () => dropzone.classList.remove('border-ph-orange', 'bg-neutral-800')));
        dropzone.addEventListener('drop', (e) => handleFilesSelection(e.dataTransfer.files));

        function handleFilesSelection(files) {
            const validFiles = Array.from(files).filter(file => file.type.startsWith('image/') || file.type.startsWith('video/'));
            if (validFiles.length === 0) { showToast('Vui lòng chọn file hình ảnh hoặc video thích hợp!', 'error'); return; }
            selectedFiles = validFiles;
            fileCounter.textContent = `✓ Khớp ${selectedFiles.length} nội dung`;
            fileCounter.classList.remove('hidden');
        }

        // --- Fetch & Render Thư Viện Media ---
        async function fetchImages(search = '') {
            const res = await fetch(`/api/images?search=${encodeURIComponent(search)}`);
            globalMediaList = await res.json();

            const urlParams = new URLSearchParams(window.location.search);
            const isAdmin = urlParams.get('isAdmin') === '1';
            const targetId = urlParams.get('id'); // Tìm kiếm tham số ?id=... trên URL

            if (globalMediaList.length === 0) {
                galleryGrid.innerHTML = `<div class="col-span-full text-center text-neutral-600 py-12 font-bold text-sm tracking-wide bg-ph-dark rounded-xl border border-neutral-800">DANH SÁCH TRỐNG - CHƯA CÓ NỘI DUNG NÀO ĐƯỢC ĐĂNG</div>`;
                return;
            }

            galleryGrid.innerHTML = globalMediaList.map(item => {
                const checkVideo = isVideo(item.name);
                const currentLikes = item.likes || 0;
                const currentCommentsCount = item.comments ? item.comments.length : 0;

                const mediaPreview = checkVideo
                    ? `<video src="${item.url}" class="object-contain w-full h-full max-h-44" muted></video>
                       <div class="absolute inset-0 bg-black bg-opacity-30 flex items-center justify-center pointer-events-none">
                           <span class="text-black text-xs bg-ph-orange font-black px-2 py-1 rounded shadow-lg tracking-tighter">PLAY VIDEO</span>
                       </div>`
                    : `<img src="${item.url}" alt="${item.name}" class="object-contain w-full h-full max-h-44 transition-transform duration-300 group-hover:scale-105">`;

                let actionButtons = `
                    <a href="${item.url}" download="${item.name}" class="flex items-center justify-center gap-1 text-xs bg-neutral-800 text-gray-300 py-2 rounded-lg hover:bg-neutral-700 font-bold text-center transition col-span-2 tracking-wide border border-neutral-700">
                        📥 TẢI XUỐNG
                    </a>
                `;

                if (isAdmin) {
                    actionButtons = `
                        <a href="${item.url}" download="${item.name}" class="flex items-center justify-center gap-1 text-xs bg-neutral-800 text-gray-300 py-2 rounded-lg hover:bg-neutral-700 font-bold text-center transition col-span-2 tracking-wide border border-neutral-700">
                            📥 TẢI XUỐNG
                        </a>
                        <button onclick="event.stopPropagation(); openEditModal('${item.name}')" class="flex items-center justify-center gap-1 text-xs bg-amber-950 text-amber-400 py-2 rounded-lg hover:bg-amber-900 font-bold text-center transition border border-amber-900/50">
                            ✏️ SỬA
                        </button>
                        <button onclick="event.stopPropagation(); deleteImage('${item.name}')" class="flex items-center justify-center gap-1 text-xs bg-rose-950 text-rose-400 py-2 rounded-lg hover:bg-rose-900 font-bold text-center transition border border-rose-900/50">
                            🗑️ XÓA
                        </button>
                    `;
                }

                const dateStr = new Date(item.updatedAt || item.uploadedAt).toLocaleString('vi-VN', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });

                return `
                    <div onclick="openModal('${item.url}', '${item.name}')" class="bg-ph-dark rounded-xl overflow-hidden border border-neutral-800 flex flex-col justify-between shadow-lg group cursor-pointer">
                        <div class="aspect-video bg-neutral-950 flex items-center justify-center overflow-hidden relative">
                            ${mediaPreview}
                        </div>
                        <div class="p-3.5 flex-grow flex flex-col justify-between space-y-2">
                            <div>
                                <h3 class="font-bold text-sm text-white group-hover:text-ph-orange transition truncate" title="${item.name}">${item.name}</h3>
                                <p class="text-xs text-neutral-500 mt-1 line-clamp-1 leading-relaxed">${item.description || '<i class="text-neutral-700">Không có mô tả sản phẩm</i>'}</p>
                                <div class="flex items-center justify-between mt-2">
                                    <span class="text-[10px] text-neutral-600 font-mono">📅 ${dateStr}</span>
                                    <span class="text-[10px] text-ph-orange font-bold flex items-center gap-2 bg-neutral-900 px-2 py-0.5 rounded border border-neutral-800">
                                        <span>❤️ ${currentLikes}</span>
                                        <span>💬 ${currentCommentsCount}</span>
                                    </span>
                                </div>
                            </div>
                            <div>
                                <div class="flex flex-wrap gap-1 my-1">
                                    ${item.hashtags.map(tag => `<span class="bg-neutral-900 text-neutral-400 text-[10px] font-bold px-2 py-0.5 rounded border border-neutral-800">#${tag}</span>`).join('')}
                                </div>
                                <div class="grid grid-cols-2 gap-2 pt-2 border-t border-neutral-800">
                                    ${actionButtons}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // TỰ ĐỘNG BẬT CHI TIẾT FILE NẾU URL CÓ PARAM ?id=
            if (isInitialLoad && targetId) {
                isInitialLoad = false;
                const matchedItem = globalMediaList.find(img => img.name === targetId);
                if (matchedItem) {
                    openModal(matchedItem.url, matchedItem.name);
                } else {
                    showToast('Đường dẫn bài đăng không tồn tại hoặc đã bị xóa!', 'error');
                }
            }

            if (!mediaModal.classList.contains('hidden') && activeMediaName) {
                renderModalInteractions(activeMediaName);
            }
        }

        // --- Gửi dữ liệu Tải lên ---
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (selectedFiles.length === 0) { showToast('Vui lòng chọn hoặc kéo thả tệp tin!', 'error'); return; }
            const formData = new FormData();
            selectedFiles.forEach(file => formData.append('images', file));
            formData.append('hashtags', document.getElementById('tagsInput').value);
            formData.append('description', document.getElementById('descInput').value);

            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const result = await res.json();
                if (res.ok) {
                    showToast(result.message || 'Tải dữ liệu lên BeoHub thành công!', 'success');
                    uploadForm.reset(); selectedFiles = []; fileCounter.classList.add('hidden');
                    fetchImages();
                }
            } catch (err) { showToast('Lỗi kết nối tới máy chủ BeoHub!', 'error'); }
        });

        // --- Cập nhật Thông tin form Sửa ---
        function openEditModal(name) {
            const currentItem = globalMediaList.find(item => item.name === name);
            if (!currentItem) return;

            editOldName.value = currentItem.name;
            document.getElementById('editNewNameInput').value = currentItem.name;
            editTagsInput.value = currentItem.hashtags.join(', ');
            editDescInput.value = currentItem.description || '';
            editFileInput.value = '';

            editModal.classList.remove('hidden');
        }

        function closeEditModal() { editModal.classList.add('hidden'); }

        editForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const urlParams = new URLSearchParams(window.location.search);
            const isAdmin = urlParams.get('isAdmin') || '0';
            const oldName = editOldName.value;
            const newName = document.getElementById('editNewNameInput').value;

            const formData = new FormData();
            formData.append('newName', newName);
            formData.append('hashtags', editTagsInput.value);
            formData.append('description', editDescInput.value);

            if (editFileInput.files.length > 0) formData.append('newImage', editFileInput.files[0]);

            try {
                const res = await fetch(`/api/images/${encodeURIComponent(oldName)}?isAdmin=${isAdmin}`, { method: 'PUT', body: formData });
                const result = await res.json();

                if (res.ok && result.success) {
                    showToast(result.message, 'success');
                    closeEditModal();
                    fetchImages(searchInput.value);
                } else { showToast(result.message, 'error'); }
            } catch (err) { showToast('Có lỗi xảy ra khi cập nhật tệp tin.', 'error'); }
        });

        // --- API Xóa Bỏ ---
        async function deleteImage(fileName) {
            if (!confirm(`Hành động này sẽ xóa vĩnh viễn tệp tin "${fileName}" khỏi hệ thống BeoHub. Bạn có chắc chắn?`)) return;
            const urlParams = new URLSearchParams(window.location.search);
            const isAdmin = urlParams.get('isAdmin') || '0';
            try {
                const res = await fetch(`/api/images/${encodeURIComponent(fileName)}?isAdmin=${isAdmin}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) { showToast(result.message, 'success'); fetchImages(searchInput.value); }
            } catch (err) { showToast('Gặp lỗi khi xóa dữ liệu.', 'error'); }
        }

        // Tìm kiếm gõ chữ realtime
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => fetchImages(e.target.value), 300);
        });

        // --- TRÌNH XEM PREVIEW CHI TIẾT & TƯƠNG TÁC ---
        function openModal(url, name) {
            activeMediaName = name;

            // 1. ĐẨY PARAM ?id= CHỮA TÊN FILE LÊN URL TRÌNH DUYỆT KHÔNG LÀM TẢI LẠI TRANG
            const urlParams = new URLSearchParams(window.location.search);
            urlParams.set('id', name);
            const newUrl = window.location.pathname + '?' + urlParams.toString();
            window.history.pushState({ path: newUrl }, '', newUrl);

            // Render nội dung media sang khung bên trái
            modalContent.innerHTML = isVideo(name)
                ? `<video src="${url}" class="max-w-full max-h-full rounded shadow-lg" controls autoplay></video>`
                : `<img src="${url}" class="max-w-full max-h-full object-contain">`;

            renderModalInteractions(name);
            mediaModal.classList.remove('hidden');
        }

        function renderModalInteractions(name) {
            const currentItem = globalMediaList.find(item => item.name === name);
            if (!currentItem) return;

            modalTitle.textContent = currentItem.name;
            modalDesc.innerHTML = currentItem.description || '<i class="text-neutral-700">Không có mô tả sản phẩm</i>';
            likeCount.textContent = currentItem.likes || 0;

            modalTags.innerHTML = currentItem.hashtags.map(tag => `
                <span class="bg-neutral-900 text-neutral-400 text-[10px] font-bold px-2 py-0.5 rounded border border-neutral-800">#${tag}</span>
            `).join('');

            const comments = currentItem.comments || [];
            if (comments.length === 0) {
                commentsContainer.innerHTML = `<div class="text-center text-neutral-600 text-xs py-8 italic">Chưa có bình luận nào. Hãy là người đầu tiên để lại ý kiến!</div>`;
            } else {
                commentsContainer.innerHTML = comments.map(cmt => {
                    const cmtDate = new Date(cmt.createdAt).toLocaleString('vi-VN', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });
                    return `
                        <div class="bg-neutral-900 border border-neutral-800 p-2.5 rounded-lg text-xs space-y-1">
                            <div class="flex items-center justify-between font-bold">
                                <span class="text-ph-orange">🧡 ${cmt.author}</span>
                                <span class="text-[10px] text-neutral-600 font-mono">${cmtDate}</span>
                            </div>
                            <p class="text-gray-300 leading-relaxed font-medium break-all">${cmt.text}</p>
                        </div>
                    `;
                }).join('');
                commentsContainer.scrollTop = commentsContainer.scrollHeight;
            }
        }

        // XỬ LÝ SỰ KIỆN BẤM COPY LINK SHARE QUY HOẠCH DIRECT LINK
        shareLinkBtn.onclick = async () => {
            if (!activeMediaName) return;

            // Lấy ra URL hoàn chỉnh trên thanh địa chỉ (bao gồm cả IP LAN và ?id=...)
            const shareUrl = window.location.href;

            // Cách 1: Thử dùng API hiện đại của trình duyệt
            if (navigator.clipboard && navigator.clipboard.writeText) {
                try {
                    await navigator.clipboard.writeText(shareUrl);
                    showToast('Đã copy đường dẫn bài đăng vào bộ nhớ tạm!', 'success');
                    return; // Thành công thì thoát hàm luôn
                } catch (err) {
                    console.log("API Clipboard bị chặn, chuyển sang phương thức dự phòng...");
                }
            }

            // Cách 2: Phương thức dự phòng (Fallback) - Chạy tốt trên HTTP mạng LAN
            try {
                // Tạo một thẻ textarea ẩn trong bộ nhớ
                const textArea = document.createElement("textarea");
                textArea.value = shareUrl;

                // Đẩy nó ra ngoài màn hình nhưng ẩn đi để người dùng không thấy
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);

                // Kích hoạt bôi đen và copy truyền thống
                textArea.focus();
                textArea.select();
                const successful = document.execCommand('copy');

                // Xóa thẻ textarea tạm sau khi dùng xong
                document.body.removeChild(textArea);

                if (successful) {
                    showToast('Đã copy đường dẫn bài đăng (LAN Fallback)!', 'success');
                } else {
                    showToast('Trình duyệt từ chối lệnh copy, vui lòng tự copy trên thanh địa chỉ.', 'error');
                }
            } catch (err) {
                console.error('Lỗi Fallback:', err);
                showToast('Không thể tự động sao chép link!', 'error');
            }
        };

        likeBtn.onclick = async () => {
            if (!activeMediaName) return;
            try {
                const res = await fetch(`/api/images/${encodeURIComponent(activeMediaName)}/like`, { method: 'POST' });
                const result = await res.json();
                if (result.success) {
                    likeCount.textContent = result.likes;
                    fetchImages(searchInput.value);
                }
            } catch (err) { console.error('Lỗi thả tim:', err); }
        };

        commentForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = commentInput.value.trim();
            if (!text || !activeMediaName) return;

            try {
                const res = await fetch(`/api/images/${encodeURIComponent(activeMediaName)}/comment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const result = await res.json();
                if (result.success) {
                    commentInput.value = '';
                    fetchImages(searchInput.value);
                } else { showToast(result.message, 'error'); }
            } catch (err) { console.error('Lỗi gửi bình luận:', err); }
        };

        function closeModal() {
            mediaModal.classList.add('hidden');
            modalContent.innerHTML = '';
            activeMediaName = "";

            // XÓA THAM SỐ ?id= KHỎI THANH ĐỊA CHỈ KHI ĐÓNG MODAL
            const urlParams = new URLSearchParams(window.location.search);
            urlParams.delete('id');
            const cleanUrl = window.location.pathname + (urlParams.toString() ? '?' + urlParams.toString() : '');
            window.history.pushState({ path: cleanUrl }, '', cleanUrl);
        }

        function closeEditModal() { editModal.classList.add('hidden'); }
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeModal(); closeEditModal(); } });

        fetchImages();
    </script>
</body>

</html>
