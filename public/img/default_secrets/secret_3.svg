<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="spaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#311042"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Cosmic Background -->
  <rect width="500" height="500" rx="30" fill="url(#spaceGrad)" stroke="#c084fc" stroke-width="6"/>
  <!-- Stars -->
  <circle cx="80" cy="120" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="150" cy="400" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="420" cy="150" r="3" fill="#fff" opacity="0.9"/>
  <circle cx="380" cy="380" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="280" cy="100" r="1.5" fill="#fff" opacity="0.7"/>
  
  <!-- Title -->
  <text x="250" y="70" text-anchor="middle" font-family="'Impact', 'Arial Black', sans-serif" font-size="36" fill="url(#purpleGrad)" font-weight="black" letter-spacing="2">LBEÔ TRIẾT GIA TINH HOA</text>
  
  <!-- Space Helmet & Meditating Lbeo -->
  <g transform="translate(250, 270)">
    <!-- Meditating Arms & Legs Outline -->
    <path d="M-110 50 Q-80 90 -40 60" stroke="#a78bfa" stroke-width="6" fill="none"/>
    <path d="M110 50 Q80 90 40 60" stroke="#a78bfa" stroke-width="6" fill="none"/>
    
    <!-- Face Contour -->
    <ellipse cx="0" cy="0" rx="80" ry="90" fill="#fef08a" stroke="#d97706" stroke-width="6"/>
    
    <!-- Peaceful Closed Eyes -->
    <path d="M-45 -10 Q-30 -25 -15 -10" fill="none" stroke="#451a03" stroke-width="5" stroke-linecap="round"/>
    <path d="M15 -10 Q30 -25 45 -10" fill="none" stroke="#451a03" stroke-width="5" stroke-linecap="round"/>
    <!-- Gentle Wise Smile -->
    <path d="M-20 35 Q0 50 20 35" fill="none" stroke="#451a03" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Red Dot on forehead (Zen) -->
    <circle cx="0" cy="-25" r="7" fill="#ef4444"/>
    
    <!-- Glass Space Helmet Bubble -->
    <circle cx="0" cy="0" r="115" fill="none" stroke="#67e8f9" stroke-width="4" opacity="0.8"/>
    <!-- Glass Reflections -->
    <path d="M-80 -80 Q-20 -105 40 -90" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="70" cy="-70" r="8" fill="#fff" opacity="0.3"/>
  </g>
  
  <!-- Cloud/Zen Pad below -->
  <path d="M130 370 Q170 330 250 350 Q330 330 370 370 Q400 395 350 410 L150 410 Q100 395 130 370 Z" fill="#e2e8f0" opacity="0.9" stroke="#cbd5e1" stroke-width="2"/>
  
  <text x="250" y="450" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#94a3b8" font-weight="bold">"Vũ trụ bao la, Lbeo là tinh hoa!"</text>
</svg>
