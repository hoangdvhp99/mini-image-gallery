<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#311042"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="500" rx="30" fill="url(#bgGrad)" stroke="#f59e0b" stroke-width="6"/>
  <!-- Decorative Glow -->
  <circle cx="250" cy="250" r="180" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="10 5" opacity="0.3"/>
  
  <!-- Title -->
  <text x="250" y="70" text-anchor="middle" font-family="'Impact', 'Arial Black', sans-serif" font-size="36" fill="url(#goldGrad)" font-weight="black" letter-spacing="2">LBEÔ CHỦ TỊCH VẠN ĐÔ</text>
  
  <!-- Lbeo Silhouette Face representation -->
  <g transform="translate(250, 260)">
    <!-- Face Contour -->
    <ellipse cx="0" cy="20" rx="90" ry="100" fill="#fde047" stroke="#ca8a04" stroke-width="8"/>
    <!-- Cheeks (Blushing) -->
    <circle cx="-50" cy="30" r="15" fill="#f43f5e" opacity="0.6"/>
    <circle cx="50" cy="30" r="15" fill="#f43f5e" opacity="0.6"/>
    <!-- Giant Cool Sunglasses -->
    <path d="M-75 -15 L-15 -15 L-25 20 L-65 20 Z" fill="#000" stroke="#fff" stroke-width="3"/>
    <path d="M15 -15 L75 -15 L65 20 L25 20 Z" fill="#000" stroke="#fff" stroke-width="3"/>
    <path d="M-15 -10 L15 -10" stroke="#000" stroke-width="6"/>
    <!-- Mustache -->
    <path d="M-30 45 Q-15 35 0 45 Q15 35 30 45 Q40 60 25 55 Q0 50 -25 55 Q-40 60 -30 45 Z" fill="#1e293b"/>
    <!-- Mouth (Big Smile) -->
    <path d="M-35 60 Q0 90 35 60" fill="none" stroke="#ca8a04" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Gold Crown -->
    <path d="M-70 -70 L-40 -40 L0 -85 L40 -40 L70 -70 L50 -20 L-50 -20 Z" fill="url(#goldGrad)" stroke="#b45309" stroke-width="4"/>
    <!-- Jewels on Crown -->
    <circle cx="-70" cy="-70" r="6" fill="#ef4444"/>
    <circle cx="0" cy="-85" r="8" fill="#3b82f6"/>
    <circle cx="70" cy="-70" r="6" fill="#ef4444"/>
    <circle cx="-40" cy="-40" r="5" fill="#10b981"/>
    <circle cx="40" cy="-40" r="5" fill="#10b981"/>
  </g>
  
  <!-- Dollar Signs & Wealth -->
  <text x="70" y="440" font-family="Arial, sans-serif" font-size="70" fill="#22c55e" font-weight="bold" opacity="0.8">$</text>
  <text x="400" y="440" font-family="Arial, sans-serif" font-size="70" fill="#22c55e" font-weight="bold" opacity="0.8">$</text>
  <text x="250" y="450" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#94a3b8" font-weight="bold">"Đừng dạy người giàu cách tiêu tiền!"</text>
</svg>
