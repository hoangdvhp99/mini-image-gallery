<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="40%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#311042"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="500" rx="30" fill="url(#skyGrad)" stroke="#f472b6" stroke-width="6"/>
  
  <!-- Title -->
  <text x="250" y="70" text-anchor="middle" font-family="'Impact', 'Arial Black', sans-serif" font-size="32" fill="url(#goldGrad)" font-weight="black" letter-spacing="2">LBEÔ THẦN ĐIÊU ĐẠI HIỆP</text>
  
  <!-- Big Chicken (Thần Điêu) -->
  <g transform="translate(250, 310)">
    <!-- Chicken Body -->
    <ellipse cx="0" cy="30" rx="100" ry="70" fill="#fff" stroke="#cbd5e1" stroke-width="4"/>
    <!-- Wings -->
    <path d="M-90 10 Q-130 -20 -80 -40 Q-50 -10 -90 10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="3"/>
    <path d="M90 10 Q130 -20 80 -40 Q50 -10 90 10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="3"/>
    <!-- Chicken Head -->
    <circle cx="0" cy="-60" r="40" fill="#fff" stroke="#cbd5e1" stroke-width="4"/>
    <!-- Beak -->
    <polygon points="-10,-65 20,-60 -10,-55" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <!-- Comb (Mào gà đỏ rực) -->
    <path d="M-20,-98 Q0,-120 20,-98 Q10,-85 0,-100 Q-10,-85 -20,-98" fill="#ef4444"/>
    <!-- Chicken Eyes -->
    <circle cx="-12" cy="-65" r="4" fill="#000"/>
    <circle cx="12" cy="-65" r="4" fill="#000"/>
    
    <!-- Lbeo Riding on Back -->
    <g transform="translate(0, -100)">
      <!-- Lbeo Face Contour -->
      <ellipse cx="0" cy="-10" rx="45" ry="50" fill="#fed7aa" stroke="#ea580c" stroke-width="5"/>
      <!-- Sunglasses -->
      <path d="M-40 -25 L-5 -25 L-10 -10 L-35 -10 Z" fill="#000"/>
      <path d="M5 -25 L40 -25 L35 -10 L10 -10 Z" fill="#000"/>
      <line x1="-5" y1="-22" x2="5" y2="-22" stroke="#000" stroke-width="3"/>
      <!-- Happy Mouth -->
      <path d="M-15 15 Q0 28 15 15" fill="none" stroke="#ea580c" stroke-width="4" stroke-linecap="round"/>
      <!-- Long Hair (Hiệp khách) -->
      <path d="M-45 -20 Q-60 10 -40 30" fill="none" stroke="#1e293b" stroke-width="4"/>
      <path d="M45 -20 Q60 10 40 30" fill="none" stroke="#1e293b" stroke-width="4"/>
    </g>
  </g>
  
  <text x="250" y="450" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#fef08a" font-weight="bold">"Điêu này tuy to nhưng rất hay gáy!"</text>
</svg>
