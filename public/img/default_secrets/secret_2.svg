<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="500" rx="30" fill="url(#bgGrad)" stroke="#38bdf8" stroke-width="6"/>
  <!-- Decorative Glow Circles -->
  <circle cx="250" cy="250" r="160" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.4"/>
  <circle cx="250" cy="250" r="200" fill="none" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="12 6" opacity="0.2"/>
  
  <!-- Title -->
  <text x="250" y="70" text-anchor="middle" font-family="'Impact', 'Arial Black', sans-serif" font-size="36" fill="url(#neonGrad)" font-weight="black" letter-spacing="2">LBEÔ SIÊU NHÂN LAN</text>
  
  <!-- Superhero Mask & Face -->
  <g transform="translate(250, 260)">
    <!-- Superhero Cape (Wing outline behind) -->
    <path d="M-150 60 L-100 -20 L-50 40 L50 40 L100 -20 L150 60 Z" fill="#ef4444" stroke="#b91c1c" stroke-width="4"/>
    <!-- Face Contour -->
    <ellipse cx="0" cy="20" rx="90" ry="100" fill="#fed7aa" stroke="#ea580c" stroke-width="8"/>
    <!-- Superhero Blue Eye Mask -->
    <path d="M-85 -5 Q-40 -40 0 -5 Q40 -40 85 -5 Q60 30 30 15 Q0 35 -30 15 Q-60 30 -85 -5 Z" fill="#0284c7" stroke="#0369a1" stroke-width="4"/>
    <!-- Eyes glowing inside mask -->
    <ellipse cx="-40" cy="-2" rx="15" ry="8" fill="#fff"/>
    <ellipse cx="40" cy="-2" rx="15" ry="8" fill="#fff"/>
    <circle cx="-40" cy="-2" r="4" fill="#0f172a"/>
    <circle cx="40" cy="-2" r="4" fill="#0f172a"/>
    
    <!-- Ethernet RJ45 Plug on Forehead -->
    <rect x="-18" y="-95" width="36" height="40" rx="4" fill="#94a3b8" stroke="#475569" stroke-width="3"/>
    <rect x="-12" y="-115" width="24" height="20" rx="2" fill="#cbd5e1" stroke="#475569" stroke-width="2"/>
    <line x1="-8" y1="-115" x2="-8" y2="-95" stroke="#f59e0b" stroke-width="2"/>
    <line x1="0" y1="-115" x2="0" y2="-95" stroke="#10b981" stroke-width="2"/>
    <line x1="8" y1="-115" x2="8" y2="-95" stroke="#3b82f6" stroke-width="2"/>
    
    <!-- Cheerful mouth -->
    <path d="M-25 65 Q0 85 25 65" fill="none" stroke="#b45309" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- Speed Lines / Network cables around -->
  <path d="M40 180 L120 200" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M40 220 L110 230" stroke="#10b981" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M460 180 L380 200" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M460 220 L390 230" stroke="#ef4444" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  
  <text x="250" y="450" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#94a3b8" font-weight="bold">"Băng thông 10Gbps chạy bằng cơm!"</text>
</svg>
