<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="neonGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="500" rx="30" fill="url(#bgGrad)" stroke="#22c55e" stroke-width="6"/>
  
  <!-- Title -->
  <text x="250" y="70" text-anchor="middle" font-family="'Impact', 'Arial Black', sans-serif" font-size="36" fill="url(#neonGreen)" font-weight="black" letter-spacing="2">LBEÔ PHÙ THỦY CODE</text>
  
  <!-- Wizard Lbeo -->
  <g transform="translate(250, 260)">
    <!-- Face Contour -->
    <ellipse cx="0" cy="20" rx="85" ry="95" fill="#fef08a" stroke="#ca8a04" stroke-width="8"/>
    
    <!-- Big Round Geeky Glasses -->
    <circle cx="-35" cy="5" r="28" fill="none" stroke="#22c55e" stroke-width="5"/>
    <circle cx="35" cy="5" r="28" fill="none" stroke="#22c55e" stroke-width="5"/>
    <line x1="-7" y1="5" x2="7" y2="5" stroke="#22c55e" stroke-width="5"/>
    
    <!-- Eyes -->
    <circle cx="-35" cy="5" r="6" fill="#1e293b"/>
    <circle cx="35" cy="5" r="6" fill="#1e293b"/>
    
    <!-- Mouth -->
    <path d="M-25 55 Q0 75 25 55" fill="none" stroke="#854d0e" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Giant Purple Wizard Hat -->
    <path d="M-110 -30 L-60 -115 L0 -160 L60 -115 L110 -30 Q0 -10 -110 -30 Z" fill="#6b21a8" stroke="#581c87" stroke-width="4"/>
    <!-- Yellow Star on Hat -->
    <path d="M0 -110 L5 -95 L20 -95 L10 -85 L15 -70 L0 -80 L-15 -70 L-10 -85 L-20 -95 L-5 -95 Z" fill="#f59e0b"/>
  </g>
  
  <!-- Binary Sparks (0s and 1s) -->
  <text x="80" y="150" font-family="Courier New, monospace" font-size="30" fill="#22c55e" font-weight="bold" opacity="0.6">01</text>
  <text x="380" y="150" font-family="Courier New, monospace" font-size="30" fill="#22c55e" font-weight="bold" opacity="0.6">10</text>
  <text x="70" y="380" font-family="Courier New, monospace" font-size="35" fill="#22c55e" font-weight="bold" opacity="0.4">1101</text>
  <text x="360" y="380" font-family="Courier New, monospace" font-size="35" fill="#22c55e" font-weight="bold" opacity="0.4">0011</text>
  
  <text x="250" y="450" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#94a3b8" font-weight="bold">"Bình luận dạo cũng ra bug!"</text>
</svg>
