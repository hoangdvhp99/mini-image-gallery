name: BeoHub Auto Deploy CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "🚀 Bắt đầu quá trình Tự động Deploy trên Server..."
            
            # Di chuyển vào thư mục dự án
            cd ${{ secrets.WORK_DIR }}
            
            # Lấy code mới nhất từ nhánh main
            git pull origin main
            
            # Cài đặt các package dependencies mới
            npm install --production
            
            # Khởi động lại ứng dụng Node.js bằng PM2
            pm2 restart server.js || pm2 start server.js --name "beohub"
            
            echo "✅ Đã deploy thành công phiên bản mới nhất!"
